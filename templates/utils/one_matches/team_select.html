<div class="input-group dropdown h-100">
    <span class="input-group-text">
        <i class="fa-solid fa-users"></i>
    </span>
    <button class="form-select text-start d-flex align-items-center justify-content-between py-2 px-3 dropdown-toggle shadow-none team-select-button" 
            type="button" 
            data-bs-toggle="dropdown" 
            data-bs-boundary="viewport"
            aria-expanded="false"
            style="min-height: 42px;">
        <div class="d-flex align-items-center overflow-hidden">
            {% if selected_team %}
                {% for team in zone %}
                    {% if selected_team == team.nation_name %}
                        {% if team.image_flag %}
                            <img src="{{ team.image_flag }}" class="img-card flag-circle me-2" style="width: 24px; height: 16px; min-width: 24px; object-fit: cover;" alt="{{ team.nation_name }}">
                        {% else %}
                            <div class="img-card flag-circle me-2 d-flex align-items-center justify-content-center bg-light" style="width: 24px; height: 16px; min-width: 24px;">
                                <i class="fa-solid fa-flag text-secondary opacity-50" style="font-size: 10px;"></i>
                            </div>
                        {% endif %}
                        <span class="text-truncate fw-bold">{{ team.nation_name }}</span>
                    {% endif %}
                {% endfor %}
            {% else %}
                <span class="text-muted text-truncate">{% firstof label "Select Team" %}</span>
            {% endif %}
        </div>
    </button>
    <ul class="dropdown-menu w-100 shadow-lg custom-dropdown-menu p-0 mt-1">
        {% if zone is not None %}
            {% for team in zone %}
                <li>
                    <button class="dropdown-item d-flex align-items-center py-2 px-3" 
                            type="button"
                            hx-get="{% url url_select %}"
                            hx-vals='{"team": "{{ team.nation_iso_code }}"}'
                            hx-target="body" data-loading-disable>
                        {% if team.image_flag %}
                            <img src="{{ team.image_flag }}" class="img-card flag-circle me-3" style="width: 28px; height: 18px; min-width: 28px; object-fit: cover;" alt="{{ team.nation_name }}">
                        {% else %}
                            <div class="img-card flag-circle me-3 d-flex align-items-center justify-content-center bg-light" style="width: 28px; height: 18px; min-width: 28px;">
                                <i class="fa-solid fa-flag text-secondary opacity-50" style="font-size: 12px;"></i>
                            </div>
                        {% endif %}
                        <span class="fw-medium">{{ team.nation_name }}</span>
                    </button>
                </li>
            {% endfor %}
        {% endif %}
    </ul>
</div>
