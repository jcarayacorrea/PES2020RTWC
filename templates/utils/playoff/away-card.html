{% load core_tags %}

<div class="team-card-sm">
    <div class="row g-0 align-items-center">
        {% result_one_match_away match as awayborder %}
        <div class="col-5 d-flex justify-content-center">
            {% if match.awayTeam.team.image_flag %}
                <div class="flag-wrapper-sm">
                    <img src="{{ match.awayTeam.team.image_flag }}"
                         class="img-card {{ awayborder }} my-1" alt="{{ match.awayTeam.team.nation_name }}">
                </div>
            {% else %}
                <div class="flag-wrapper-sm">
                    <div class="img-card {{ awayborder }} flag-missing my-1">
                        <i class="fa-solid fa-flag"></i>
                    </div>
                </div>
            {% endif %}
        </div>
        <div class="col-7">
            <div class="name-config-sm m-0 justify-content-start text-start fw-bold">
                {{ match.awayTeam.team.nation_iso_code }}
            </div>
        </div>
    </div>
</div>
