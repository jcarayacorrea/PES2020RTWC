<div class="team-card-sm">
    <div class="row g-0 align-items-center">
        {% rstonemtchaway match as awayborder %}
        <div class="col-3 d-flex justify-content-center">
            <img src="{{ match.awayTeam.team.image_flag }}"
                 class="img-card {{ awayborder }} my-1">
        </div>
        <div class="col-6">
            <div class="name-config-sm m-0">
                {{ match.awayTeam.team.nation_name }}
            </div>
        </div>
        <div class="col-3">
            <div class="goal m-0 text-center">
                {{ match.awayTeam.goals|default_if_none:"?" }}
                <small>({{ match.awayTeam.penalties|default_if_none:"?" }})</small>
            </div>
        </div>
    </div>
</div>
