{% load core_tags %}

<div class="team-card-sm">
    <div class="row g-0 align-items-center">
        {% result_bg_away match as awayborder %}
        <div class="col-4 d-flex justify-content-center">
            {% if match.awayTeam.team.image_flag %}
                <img src="{{ match.awayTeam.team.image_flag }}"
                     class="img-card {{ awayborder }} my-1" alt="{{ match.awayTeam.team.nation_name }}">
            {% else %}
                <div class="img-card {{ awayborder }} my-1 d-flex align-items-center justify-content-center bg-light">
                    <i class="fa-solid fa-flag text-secondary opacity-50"></i>
                </div>
            {% endif %}
        </div>
        <div class="col-8">
            <div class="name-config-sm m-0 justify-content-start text-start">
                {{ match.awayTeam.team.nation_name }}
            </div>
        </div>
    </div>
</div>
