{% load core_tags %}

<div class="team-card-sm">
    <div class="row g-0 align-items-center">
        {% result_bg_home match as homeborder %}
        <div class="col-8">
            <div class="name-config-sm m-0 justify-content-end text-end">
                {{ match.homeTeam.team.nation_name }}
            </div>
        </div>
        <div class="col-4 d-flex justify-content-center">
            <img src="{{ match.homeTeam.team.image_flag }}"
                 class="img-card {{ homeborder }} my-1">
        </div>
    </div>
</div>
