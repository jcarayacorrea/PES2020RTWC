<div class="team-card">
    <div class="row g-0 align-items-center">
        <div class="col-4 d-flex justify-content-center">
            {% if team.image_flag %}
                <img src="{{ team.image_flag }}" class="img-card my-1" alt="{{ team.nation_name }}">
            {% else %}
                <div class="img-card my-1 d-flex align-items-center justify-content-center bg-light">
                    <i class="fa-solid fa-flag text-secondary opacity-50"></i>
                </div>
            {% endif %}
        </div>
        <div class="col-8">
            <div class="name-config m-0 text-start">
                {% firstof team.nation_name grouppos %}
            </div>
        </div>
    </div>
</div>
