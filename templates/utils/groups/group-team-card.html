<div class="team-card">
    <div class="row g-0 align-items-center">
        <div class="col-3 d-flex justify-content-center">
            {% if team.image_flag %}
                <div class="flag-wrapper">
                    <img src="{{ team.image_flag }}" class="img-card my-1" alt="{{ team.nation_name }}">
                </div>
            {% else %}
                <div class="flag-wrapper">
                    <div class="img-card flag-missing my-1">
                        <i class="fa-solid fa-flag"></i>
                    </div>
                </div>
            {% endif %}
        </div>
        <div class="col-9">
            <div class="name-config m-0 text-start">
                {% firstof team.nation_name grouppos %}
            </div>
        </div>
    </div>
</div>
